<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-logo">◎</div>
      <div class="loading-title">AI ASSISTANT</div>
      <div class="loading-subtitle" id="loadingSubtitle">Инициализация...</div>

      <div class="loading-bar-wrap">
        <div class="loading-bar-track">
          <div class="loading-bar-fill" id="loadingBarFill"></div>
        </div>
      <div class="loading-pct" id="loadingPct">—</div>
      </div>

      <div class="loading-detail" id="loadingDetail">&nbsp;</div>
      <button id="activateModelBtn" class="loading-activate-btn" type="button" style="display:none">Запустить модель</button>
      <div class="loading-files" id="loadingFiles"></div>
      <div class="loading-note">Модель кэшируется — следующий запуск мгновенный</div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="11" cy="11" r="4" fill="var(--accent)" opacity="0.8"/>
          <line x1="11" y1="1" x2="11" y2="5" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="11" y1="17" x2="11" y2="21" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="1" y1="11" x2="5" y2="11" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="17" y1="11" x2="21" y2="11" stroke="var(--accent)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="header-title">
        <span class="title-main">AI</span>
        <span class="title-sub">ASSISTANT</span>
      </div>
    </div>
    <div class="header-right">
      <button id="clearChat" class="btn-icon" title="Очистить чат">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M3 3L12 12M12 3L3 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Инициализация...</span>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="welcome-msg" id="welcomeMsg">
      <div class="welcome-icon">◎</div>
      <p>Локальный AI-ассистент.<br/>Модель загружается...</p>
    </div>
  </div>

  <!-- TYPING INDICATOR (скрыт по умолчанию) -->
  <div class="typing-row" id="typingRow" style="display:none">
    <div class="typing-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="action-row">
      <button id="summarizeBtn" class="btn-action" title="Суммаризировать страницу">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="1" y="1" width="11" height="2" rx="1" fill="currentColor"/>
          <rect x="1" y="5" width="8" height="2" rx="1" fill="currentColor"/>
          <rect x="1" y="9" width="6" height="2" rx="1" fill="currentColor"/>
        </svg>
        Суммаризировать
      </button>
      <button id="clearContextBtn" class="btn-action" title="Очистить контекст диалога">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 6.5C2 4 4 2 6.5 2C9 2 11 4 11 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9 4.5L11 6.5L13 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 6.5C11 9 9 11 6.5 11C4 11 2 9 2 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Сбросить контекст
      </button>
    </div>
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Введите сообщение..."
        rows="1"
        disabled
      ></textarea>
      <button id="sendBtn" class="btn-send" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M8 3L4 7M8 3L12 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js" defer></script>
</body>
</html>
